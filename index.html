<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio Geométrico Master Pro</title>
    <style>
        body {
            margin: 0; background: #2c3e50; display: flex; justify-content: center;
            align-items: center; height: 100vh; color: white; font-family: sans-serif;
            overflow: hidden; touch-action: manipulation;
        }
        #game-container {
            position: relative; background: #f0f4f8; width: 98vw; max-width: 800px;
            height: 90vh; max-height: 450px; border: 4px solid #fff; border-radius: 15px;
            overflow: hidden;
        }
        canvas { display: block; width: 100%; height: 100%; }
        #ui-layer {
            position: absolute; top: 10px; left: 10px; pointer-events: none;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5); z-index: 10;
        }
        .score-board { font-size: 22px; font-weight: bold; color: #2c3e50; transition: color 0.5s; }
        .light-text { color: #ecf0f1 !important; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div id="score-label" class="score-board">Pontos: <span id="score">0</span></div>
    </div>
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- CONFIGURAÇÃO DO RANKING ---
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrbC0PJkI_XB7lMMcgmo-cVhLr45SKYzA0vmI6CIXqU7oIRjkIDxPiaBhwCLpb0yDI/exec";
    let player_name = "";

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const scoreLabel = document.getElementById('score-label');

    canvas.width = 800;
    canvas.height = 400;

    let score = 0;
    let gameActive = false;
    let frame = 0;
    let obstacles = [];

    const player = {
        x: 50, y: 300, width: 40, height: 40, dy: 0,
        jumpForce: 13, gravity: 0.7, grounded: false,
        draw() {
            // COR BASE (Dourado se score >= 4000)
            ctx.fillStyle = (score >= 4000) ? "#FFD700" : "#3498db";
            ctx.fillRect(this.x, this.y, this.width, this.height);

            // SKIN 3500: RÉGUA
            if (score >= 3500) {
                ctx.fillStyle = "#f1c40f"; ctx.save();
                ctx.translate(this.x + 5, this.y + 10); ctx.rotate(-0.5);
                ctx.fillRect(0, 0, 5, 35); ctx.fillStyle = "#000";
                for(let i=0; i<35; i+=7) ctx.fillRect(0, i, 2, 1); ctx.restore();
            }
            // SKIN 4500: COROA
            if (score >= 4500) {
                ctx.fillStyle = "#FFD700"; ctx.beginPath();
                ctx.moveTo(this.x - 5, this.y); ctx.lineTo(this.x, this.y - 15);
                ctx.lineTo(this.x + 20, this.y - 5); ctx.lineTo(this.x + 40, this.y - 15);
                ctx.lineTo(this.x + 45, this.y); ctx.fill();
            }
            // SKIN 5000: BRAÇOS
            if (score >= 5000) {
                ctx.strokeStyle = "#B8860B"; ctx.lineWidth = 4;
                let swing = Math.sin(frame * 0.2) * 12;
                ctx.beginPath(); ctx.moveTo(this.x + 20, this.y + 20);
                ctx.lineTo(this.x + 35 + swing, this.y + 35); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(this.x + 20, this.y + 20);
                ctx.lineTo(this.x - 10 - swing, this.y + 35); ctx.stroke();
            }
        },
        update() {
            if (this.y + this.height < canvas.height - 20) {
                this.dy += this.gravity; this.grounded = false;
            } else {
                this.dy = 0; this.grounded = true; this.y = canvas.height - 20 - this.height;
            }
            this.y += this.dy;
        }
    };

    function spawnObstacle() {
        let size = 30 + Math.random() * 25;
        obstacles.push({
            x: canvas.width, y: canvas.height - 20 - size,
            width: size, height: size, speed: 6 + (score / 1500)
        });
    }

    async function gameOver() {
        gameActive = false;
        
        if (score > 0) {
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ nome: player_name, pontos: Math.floor(score) })
            }).catch(e => console.log("Erro ranking"));
        }

        alert("Fim de Jogo, " + player_name + "!\nPontos: " + Math.floor(score));
        resetGame();
    }

    function resetGame() {
        score = 0;
        scoreElement.innerText = "0";
        obstacles = [];
        frame = 0;
        player.y = 300;
        player.dy = 0;
        gameActive = true;
        // Não chamamos loop() aqui para não duplicar o requestAnimationFrame
    }

    function loop() {
        if (!gameActive) {
            requestAnimationFrame(loop);
            return;
        }
        
        frame++;

        // CENÁRIO DINÂMICO
        if (score >= 4000) { 
            ctx.fillStyle = "#0a0e14"; scoreLabel.classList.add('light-text'); 
        } else if (score >= 2000) { 
            ctx.fillStyle = "#1a252f"; scoreLabel.classList.add('light-text');
        } else { 
            ctx.fillStyle = "#f0f4f8"; scoreLabel.classList.remove('light-text');
        }
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // CHÃO
        ctx.fillStyle = "#27ae60"; ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

        player.update();
        player.draw();

        if (frame % Math.max(50, 110 - Math.floor(score/800)) === 0) spawnObstacle();

        for (let i = obstacles.length - 1; i >= 0; i--) {
            obstacles[i].x -= obstacles[i].speed;
            ctx.fillStyle = "#e74c3c";
            ctx.fillRect(obstacles[i].x, obstacles[i].y, obstacles[i].width, obstacles[i].height);

            if (player.x < obstacles[i].x + obstacles[i].width &&
                player.x + player.width > obstacles[i].x &&
                player.y < obstacles[i].y + obstacles[i].height &&
                player.y + player.height > obstacles[i].y) {
                gameOver();
            }

            if (obstacles[i].x + obstacles[i].width < 0) {
                obstacles.splice(i, 1);
                score += 100;
                scoreElement.innerText = score;
            }
        }
        requestAnimationFrame(loop);
    }

    function init() {
        // O jogo só começa quando o nome é digitado
        player_name = prompt("Digite seu nome para o Ranking:", "Aluno");
        if (!player_name || player_name.trim() === "") player_name = "Visitante";
        gameActive = true;
        requestAnimationFrame(loop);
    }

    // Controles
    window.addEventListener('keydown', (e) => { 
        if(e.code === 'Space' || e.code === 'ArrowUp') {
            if(player.grounded) player.dy = -player.jumpForce;
        }
    });
    canvas.addEventListener('touchstart', (e) => { 
        e.preventDefault(); 
        if(player.grounded) player.dy = -player.jumpForce; 
    }, {passive: false});

    // Inicia o processo
    init();
</script>
</body>
</html>
