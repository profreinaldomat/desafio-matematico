<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Corrida</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        #gameCanvas {
            border: 2px solid #000;
            background-color: #fff;
            max-width: 100%;
            max-height: 100%;
        }
        #score {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>
    <div id="score">Pontos: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');

        // Configurações do ranking
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxrbC0PJkI_XB7lMMcgmo-cVhLr45SKYzA0vmI6CIXqU7oIRjkIDxPiaBhwCLpb0yDI/exec";
        let player_name = prompt("Digite seu nome para o ranking:", "Aluno") || "Visitante";

        canvas.width = 800;
        canvas.height = 400;

        let score = 0;
        let frame = 0;
        let gameActive = true;

        const player = {
            x: 50,
            y: 340,
            width: 40,
            height: 40,
            dy: 0,
            jumpForce: 15,
            gravity: 0.8,
            grounded: false,
            draw() {
                // COR BASE: Fica Dourado aos 4000
                ctx.fillStyle = (score >= 4000) ? "#FFD700" : "#3498db";
                ctx.fillRect(this.x, this.y, this.width, this.height);

                // SKIN 3500: RÉGUA
                if (score >= 3500) {
                    ctx.fillStyle = "#f1c40f";
                    ctx.fillRect(this.x + 10, this.y - 10, 5, 20); // Desenho simples da régua
                }

                // SKIN 4500: COROA
                if (score >= 4500) {
                    ctx.fillStyle = "#FFD700";
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y);
                    ctx.lineTo(this.x + 20, this.y - 15);
                    ctx.lineTo(this.x + 40, this.y);
                    ctx.fill();
                }

                // SKIN 5000: BRAÇOS
                if (score >= 5000) {
                    ctx.strokeStyle = "#000";
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.moveTo(this.x + 40, this.y + 20);
                    ctx.lineTo(this.x + 55, this.y + 30); // Braço direito
                    ctx.stroke();
                }
            }
        };

        const obstacles = [];
        function spawnObstacle() {
            let size = 40;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - size - 20,
                width: size,
                height: size,
                speed: 6 + (score / 1000)
            });
        }

        async function saveScore() {
            if (score > 0) {
                try {
                    await fetch(WEB_APP_URL, {
                        method: "POST",
                        mode: "no-cors",
                        body: JSON.stringify({ nome: player_name, pontos: score })
                    });
                } catch (e) { console.error("Erro ao salvar"); }
            }
        }

        function update() {
            if (!gameActive) return;
            frame++;

            if (player.y + player.height < canvas.height - 20) {
                player.dy += player.gravity;
                player.grounded = false;
            } else {
                player.dy = 0;
                player.grounded = true;
                player.y = canvas.height - player.height - 20;
            }
            player.y += player.dy;

            if (frame % 100 === 0) spawnObstacle();

            obstacles.forEach((obs, index) => {
                obs.x -= obs.speed;
                if (player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y) {
                    gameActive = false;
                    saveScore().then(() => {
                        alert("Fim de jogo! Pontos: " + score);
                        location.reload();
                    });
                }
                if (obs.x + obs.width < 0) {
                    obstacles.splice(index, 1);
                    score += 100;
                    scoreElement.innerText = "Pontos: " + score;
                }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Chão
            ctx.fillStyle = "#27ae60";
            ctx.fillRect(0, canvas.height - 20, canvas.width, 20);

            player.draw();
            
            ctx.fillStyle = "#e74c3c";
            obstacles.forEach(obs => ctx.fillRect(obs.x, obs.y, obs.width, obs.height));

            if (gameActive) requestAnimationFrame(() => { update(); draw(); });
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && player.grounded) player.dy = -player.jumpForce;
        });
        canvas.addEventListener('touchstart', () => {
            if (player.grounded) player.dy = -player.jumpForce;
        });

        draw();
    </script>
</body>
</html>
