<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Desafio Geométrico Master - Prof. ReinaldoNR</title>
    <link rel="manifest" href="manifest.json">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js')
          .then(() => console.log("Serviço registrado!"))
          .catch(err => console.log("Erro no registro:", err));
      }
    </script>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --danger: #e74c3c; --success: #27ae60; --gold: #f1c40f; }
        body { margin: 0; background: #1a252f; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: none; }
        
        #game-container { position: relative; background: #f0f4f8; border: 6px solid white; border-radius: 20px; box-shadow: 0 25px 60px rgba(0,0,0,0.6); width: 95vw; max-width: 800px; height: 80vh; max-height: 450px; overflow: hidden; display: flex; flex-direction: column; }
        canvas { display: block; background: #f0f4f8; width: 100%; height: auto; margin-top: auto; outline: none; }
        
        #phase-banner {
            position: absolute; top: 85px; left: 50%; transform: translateX(-50%);
            padding: 6px 25px; background: linear-gradient(135deg, var(--primary), #34495e);
            color: white; border-radius: 30px; font-size: 13px; font-weight: 800;
            text-transform: uppercase; letter-spacing: 2px; border: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 5;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); white-space: nowrap;
        }
        .phase-up { transform: translateX(-50%) scale(1.3) !important; filter: brightness(1.2); }

        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.96); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; padding: 20px; box-sizing: border-box; text-align: center; }
        .hidden { display: none !important; }
        
        h1 { margin: 0; font-size: clamp(28px, 8vw, 48px); letter-spacing: -1px; color: var(--primary); }
        h3 { margin: 5px 0 15px 0; color: #7f8c8d; font-weight: 400; text-transform: uppercase; font-size: 13px; letter-spacing: 1px; }
        
        .ranking-title { font-size: 14px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        #leaderboard { margin-bottom: 15px; width: 90%; max-width: 340px; font-size: 14px; color: var(--primary); background: rgba(52, 152, 219, 0.08); padding: 10px; border-radius: 15px; border: 1px solid rgba(52, 152, 219, 0.2); }
        .rank-item { display: flex; justify-content: space-between; padding: 4px 10px; font-weight: bold; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        input { padding: 12px; margin: 8px; border: 2px solid #dfe6e9; border-radius: 10px; width: 80%; max-width: 280px; font-size: 16px; text-align: center; outline: none; }
        button.btn-main { padding: 14px 40px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; }
        
        #hud { position: absolute; top: 15px; left: 25px; right: 25px; display: flex; justify-content: space-between; align-items: center; font-weight: 900; color: var(--primary); z-index: 5; font-size: 22px; pointer-events: none; }
        #btn-pause { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; pointer-events: auto; font-weight: bold; box-shadow: 0 3px 8px rgba(0,0,0,0.2); z-index: 20; }
   /* Aviso para virar o celular se estiver em pé */
@media screen and (orientation: portrait) {
    body::before {
        content: "🔄 Por favor, vire o celular para jogar!";
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #1a252f;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 999;
        font-weight: bold;
    }
}
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud" class="hidden">
        <span>👨‍🎓 <span id="p-name"></span></span>
        <button id="btn-pause" onclick="togglePause()">II</button>
        <span style="color:var(--accent)">Σ <span id="p-score">0</span></span>
    </div>

    <div id="phase-banner" class="hidden">FASE 1: CALOURO</div>

    <div id="start-screen" class="screen">
        <h1>MATEMÁTICA <span style="color:var(--accent)">PRO</span></h1>
        <h3>DESENVOLVIDO POR <b style="color:var(--primary)">PROF. REINALDONR</b></h3>
        <span class="ranking-title">🏆 OS MAIORES VENCEDORES DO J.P</span>
        <div id="leaderboard">Sincronizando recordes...</div>
        <input type="text" id="input-name" placeholder="Nome do Aluno">
        <button class="btn-main" onclick="startGame()">INICIAR DESAFIO</button>
    </div>

    <div id="pause-screen" class="screen hidden" style="background: rgba(44, 62, 80, 0.92);">
        <h1 style="color: white;">JOGO PAUSADO</h1>
        <button class="btn-main" onclick="togglePause()" style="background: var(--success); margin-top: 20px;">RETOMAR</button>
    </div>

    <div id="over-screen" class="screen hidden">
        <h2 style="color:var(--danger); font-size: 38px; margin: 0;">CÁLCULO ENCERRADO!</h2>
        <p style="font-size: 22px;">Pontuação final: <b id="f-score">0</b></p>
        <button class="btn-main" onclick="location.reload()">VER RANKING / REPETIR</button>
    </div>

    <canvas id="game" width="800" height="300" tabindex="0"></canvas>
</div>

<script>
    const WEB_APP = "https://script.google.com/macros/s/AKfycbxGNEpfmY_k9EoU_LoiuxZmMncvx8xsEhKG62TMusRZvcnGGmpTcxRMzowu3HgqnRZ5/exec";
    const canvas = document.getElementById('game'), ctx = canvas.getContext('2d');
    
    let running = false, paused = false, score = 0, speed = 7, frame = 0, playerName = "";
    let obstacles = [], particles = [], auraParticles = [], ghosts = [], shake = 0, parallaxX = 800;
    let currentPhaseName = "";
    const colors = ["#e74c3c", "#e67e22", "#f1c40f", "#2ecc71", "#9b59b6", "#3498db"];

    // VERIFICA SE JÁ EXISTE NOME SALVO AO CARREGAR
    window.onload = function() {
        const salvo = localStorage.getItem('aluno_nome');
        if (salvo) document.getElementById('input-name').value = salvo;
        loadLeaderboard();
    };

    async function loadLeaderboard() {
        try {
            const res = await fetch(WEB_APP);
            const top3 = await res.json();
            const div = document.getElementById('leaderboard');
            div.innerHTML = "";
            const medals = ["🥇", "🥈", "🥉"];
            top3.slice(0, 3).forEach((u, i) => { 
                div.innerHTML += `<div class="rank-item"><span>${medals[i]} ${u.nome}</span><span>${u.pontos} pts</span></div>`; 
            });
        } catch (e) { document.getElementById('leaderboard').innerText = "Aguardando recordes..."; }
    }

    const player = {
        x: 80, y: 220, vy: 0, grav: 0.85,
        jump() { if(this.y >= 220) { this.vy = -15; spawnParticles(this.x+15, 280, "#bdc3c7"); } },
        update() {
            if(paused) return;
            this.y += this.vy; this.vy += this.grav;
            if(this.y > 220) { this.y = 220; this.vy = 0; }
            if(speed > 9 && frame % 3 === 0) ghosts.push({x: this.x, y: this.y, alpha: 0.4});
            
            if(score >= 2500) {
                auraParticles.push({ x: this.x + Math.random() * 40, y: this.y + Math.random() * 60, vy: -Math.random() * 2, life: 1 });
            }
        },
        draw() {
            ghosts.forEach((g, i) => {
                ctx.strokeStyle = `rgba(52, 152, 219, ${g.alpha})`;
                ctx.lineWidth = 2; ctx.strokeRect(g.x+5, g.y+5, 20, 50);
                g.alpha -= 0.05; if(g.alpha <= 0) ghosts.splice(i,1);
            });

            auraParticles.forEach((p, i) => {
                ctx.fillStyle = `rgba(241, 196, 15, ${p.life})`;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, 7); ctx.fill();
                p.y += p.vy; p.life -= 0.05; if(p.life <= 0) auraParticles.splice(i, 1);
            });

            ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 4; ctx.lineCap = "round";
            ctx.beginPath(); ctx.arc(this.x+15, this.y+10, 9, 0, 7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(this.x+15, this.y+19); ctx.lineTo(this.x+15, this.y+45); ctx.stroke();
            let leg = Math.sin(frame * 0.25) * 15;
            ctx.beginPath(); ctx.moveTo(this.x+15, this.y+45); ctx.lineTo(this.x+15+leg, this.y+60); ctx.stroke(); 
            ctx.beginPath(); ctx.moveTo(this.x+15, this.y+45); ctx.lineTo(this.x+15-leg, this.y+60); ctx.stroke(); 

            if(score >= 500) { 
                ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(this.x+10, this.y+10, 4, 0, 7); ctx.stroke();
                ctx.beginPath(); ctx.arc(this.x+20, this.y+10, 4, 0, 7); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(this.x+14, this.y+10); ctx.lineTo(this.x+16, this.y+10); ctx.stroke(); ctx.lineWidth = 4;
            }
            if(score >= 1000) { 
                ctx.fillStyle = "#e74c3c"; ctx.beginPath(); ctx.moveTo(this.x+10, this.y+20);
                ctx.lineTo(this.x-15, this.y+55+Math.sin(frame*0.2)*8); ctx.lineTo(this.x+10, this.y+45); ctx.fill();
            }
            if(score >= 1500) { 
                ctx.fillStyle = "#2c3e50"; ctx.fillRect(this.x+5, this.y-4, 20, 5); 
                ctx.beginPath(); ctx.moveTo(this.x-3, this.y-4); ctx.lineTo(this.x+15, this.y-14); ctx.lineTo(this.x+33, this.y-4); ctx.lineTo(this.x+15, this.y+6); ctx.fill();
            }
            if(score >= 2000) { 
                ctx.fillStyle = "#2c3e50";
                ctx.beginPath(); ctx.moveTo(this.x + 5, this.y + 5); ctx.lineTo(this.x - 5, this.y - 10); ctx.lineTo(this.x + 10, this.y); ctx.fill();
                ctx.beginPath(); ctx.moveTo(this.x + 25, this.y + 5); ctx.lineTo(this.x + 35, this.y - 10); ctx.lineTo(this.x + 20, this.y); ctx.fill();
                ctx.strokeStyle = "#bdc3c7"; ctx.lineWidth = 2;
                for(let i=0; i<3; i++) {
                    ctx.beginPath(); ctx.moveTo(this.x - 5, this.y + 40); ctx.lineTo(this.x - 15, this.y + 50 + i*3); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(this.x + 35, this.y + 40); ctx.lineTo(this.x + 45, this.y + 50 + i*3); ctx.stroke();
                }
                ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 4;
            }
            if(score >= 3000) { 
                ctx.fillStyle = "#f1c40f"; ctx.beginPath(); ctx.arc(this.x+15, this.y+25, 6, 0, 7); ctx.fill();
                ctx.strokeStyle = "#e67e22"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(this.x+10, this.y+19); ctx.lineTo(this.x+15, this.y+25); ctx.lineTo(this.x+20, this.y+19); ctx.stroke();
            }
        }
    };

    function updatePhaseHUD() {
        const banner = document.getElementById('phase-banner');
        let newPhase = "Fase 1: Calouro";
        if (score >= 3000) newPhase = "Fase 7: Excelência de Ouro";
        else if (score >= 2500) newPhase = "Fase 6: Newtoniana";
        else if (score >= 2000) newPhase = "Fase 5: Mutação Matemática";
        else if (score >= 1500) newPhase = "Fase 4: Mestre dos Cálculos";
        else if (score >= 1000) newPhase = "Fase 3: Especialista";
        else if (score >= 500) newPhase = "Fase 2: Acadêmica";

        if(newPhase !== currentPhaseName) {
            currentPhaseName = newPhase;
            banner.innerText = currentPhaseName;
            banner.classList.add('phase-up');
            setTimeout(() => banner.classList.remove('phase-up'), 500);
        }
    }

    function spawnParticles(x, y, color) { for(let i=0; i<8; i++) particles.push({x, y, vx: Math.random()*4-2, vy: Math.random()*-4, life: 1, color}); }
    function togglePause() { if(!running) return; paused = !paused; document.getElementById('pause-screen').classList.toggle('hidden'); document.getElementById('btn-pause').innerText = paused ? "▶" : "II"; }
    
    function startGame() { 
        playerName = document.getElementById('input-name').value.trim(); 
        if(!playerName) return alert("Por favor, digite seu nome!"); 
        
        // SALVA O NOME PARA A PRÓXIMA VEZ
        localStorage.setItem('aluno_nome', playerName);

        document.getElementById('p-name').innerText = playerName; 
        document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden')); 
        document.getElementById('hud').classList.remove('hidden'); 
        document.getElementById('phase-banner').classList.remove('hidden');
        running = true; 
        canvas.focus();
        loop(); 
    }

    function loop() {
        if(!running) return;
        if(!paused) {
            if(shake > 0) { ctx.setTransform(1, 0, 0, 1, Math.random()*shake - shake/2, 0); shake *= 0.9; } else { ctx.setTransform(1, 0, 0, 1, 0, 0); }
            ctx.clearRect(0, 0, 800, 300);
            updatePhaseHUD();

            parallaxX -= speed * 0.35; if(parallaxX < -800) parallaxX = 850;
            ctx.fillStyle = "rgba(44, 62, 80, 0.05)"; ctx.font = "900 80px Arial"; ctx.textAlign = "center";
            ctx.fillText("PROF. REINALDONR", parallaxX + 400, 80);
            ctx.fillStyle = "rgba(44, 62, 80, 0.45)"; ctx.font = "bold 15px Arial";
            ctx.fillText("DESAFIO GEOMÉTRICO MASTER - PROF. REINALDO", 400, 295);
            ctx.textAlign = "left";

            ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(0, 280); ctx.lineTo(800, 280); ctx.stroke();
            player.update(); player.draw();

            if(frame % 85 === 0) {
                const types = ['sq', 'circ', 'rect', 'tri'];
                obstacles.push({ x: 850, type: types[Math.floor(Math.random() * 4)], color: colors[Math.floor(Math.random() * colors.length)] });
            }
            obstacles.forEach((o, i) => {
                o.x -= speed;
                ctx.fillStyle = o.color; ctx.beginPath();
                if(o.type === 'circ') ctx.arc(o.x+32, 248, 32, 0, 7);
                else if(o.type === 'sq') ctx.rect(o.x, 215, 65, 65);
                else if(o.type === 'rect') ctx.rect(o.x, 235, 90, 45);
                else if(o.type === 'tri') { ctx.moveTo(o.x, 280); ctx.lineTo(o.x+35, 210); ctx.lineTo(o.x+70, 280); }
                ctx.fill();

                if(player.x + 25 > o.x && player.x < o.x + 55 && player.y + 55 > 215) {
                    running = false; shake = 25;
                    document.getElementById('over-screen').classList.remove('hidden');
                    document.getElementById('f-score').innerText = score;
                    fetch(WEB_APP, { method: 'POST', mode: 'no-cors', body: JSON.stringify({aluno: playerName, pontuacao: score}) });
                }
                if(o.x < -120) { obstacles.splice(i,1); score += 10; }
            });

            particles.forEach((p, i) => { ctx.fillStyle = p.color; ctx.globalAlpha = p.life; ctx.fillRect(p.x, p.y, 4, 4); p.x += p.vx; p.y += p.vy; p.life -= 0.02; if(p.life <= 0) particles.splice(i, 1); });
            ctx.globalAlpha = 1;
            document.getElementById('p-score').innerText = score;
            frame++; speed += 0.0015;
        }
        requestAnimationFrame(loop);
    }

    function handleAction(e) { if(e) e.preventDefault(); if(running && !paused) player.jump(); }
    window.onkeydown = (e) => { if(["Space", "ArrowUp"].includes(e.code)) handleAction(e); if(e.code === "KeyP") togglePause(); };
    canvas.addEventListener('touchstart', handleAction, {passive: false});
    canvas.addEventListener('mousedown', handleAction);
</script>
</body>
</html>
